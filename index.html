        Date.prototype.getWeek = function() {
            var onejan = new Date(this.getFullYear(),0,1);
            return Math.ceil((((this - onejan) / 86400000) + onejan.getDay()+1)/7);
        } 

        function chk(){
            var html = '';
            for(var i=0;i<paper.length;i++){
                if(i%7==6) html+='<br><br><br><br><br><br>';
                html+='<table class=paper cellspacing=0 cellpadding=0 align=left>';
                var p = paper[i];
                for(var j=0; j<p.length; j++){
                    var line=p[j];
                    var idx=0;
                    html+='<tr>';
                    for(var k=0; k<6; k++){
                        var flag=true;
           $('debug2').innerHTML = 'idx=>'+idx + '<Br>'+           $('debug').innerHTML;
                        for(var l=idx; l<6; l++){
                            if(line[k] == data.balls[l]){
                                html += '<td class=red>'+line[k]+'</td>';
                                flag=false;
                                idx=l;
                                break;
                            }
                        }
                        if(flag) html+='<td>'+line[k]+'</td>';
                    }
                    html+='</tr>';
                }
                html += '</table>';
            }
            $('prt2').innerHTML = html;
        }

        function chk2(){
            var html = '';
            bingoData = [];
            for(var i=0;i<paper.length;i++){
//                if(i%7==6) html+='<br><br><br><br><br><br>';
                var phtml='<table class=paper cellspacing=0 cellpadding=0 align=left>';
                phtml+='<col align=right></col>'

                      +'<col align=right></col>'
                      +'<col align=right></col>'

                    var line=p[j];
                    var idx=0;
                    var cnt=0;      // 당첨볼 카운트
                    var bonusCnt=0; // 보너스볼
                    htmlCell='';
                    for(var k=0; k<6; k++){
                        var flag=true;
                        for(var l=idx; l<6; l++){
                            if(line[k] == data.balls[l]){
                                htmlCell += '<td class=red>'+line[k].to2()+'</td>';
                                flag=false;
                                idx=l;
                                cnt++;
                                break;
                            }
                            if(line[k] == data.bnusNo){
//                            if(line[k] == '16'){
                                htmlCell += '<td class=blue>'+line[k].to2()+'</td>';
                                flag=false;
                                idx=l;
                                bonusCnt++;
                                break;
                            }
                        }
                        if(flag) htmlCell+='<td>'+line[k].to2()+'</td>';
                    }
                    phtml+='<tr '+bingoBGColor(cnt)+'>'+htmlCell;
                    phtml+='</tr>';
                    if(cnt>2){
                        htmlCell=htmlCell.replace(/red/g,'blue');
                        phtml = phtml.replace(/paper/,'PaperWin');
                    }
                    if(cnt == 3) bingoData.push('5등');
                    else if(cnt == 4) bingoData.push('4등');
                    else if(cnt == 5){
                        if(bonusCnt) bingoData.push('2등');
                        else         bingoData.push('3등');
                    }else if(cnt == 6) bingoData.push('1등');
                }

                html += phtml;
            }
            $('prt2').innerHTML = html;
            $('bStr').innerHTML = bingoData.join('<Br />');

        }

        function bingoBGColor(cnt){

                case 3:s='class=bingo3';break;
                case 4:s='class=bingo4';break;
                case 5:s='class=bingo5';break;
                case 6:s='class=bingo6';break;
            }
            return s;
        }

        var sdt = new Date(2002,11,7); // 1회 추첨일

            cnt--;
